<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🧟 Soul Breaker</title>
<style>
    body { background:#0a0a0a; color:#eee; text-align:center; font-family:sans-serif; margin:0; padding:20px; }
    .card { background:#1a1a1a; padding:28px; margin:20px auto; max-width:560px; border-radius:18px; box-shadow:0 0 25px rgba(180,30,30,0.5); }
    button { padding:14px 26px; margin:8px; border:none; border-radius:10px; background:#333; color:white; cursor:pointer; font-size:16.5px; transition:0.2s; }
    button:hover { background:#e74c3c; transform:scale(1.05); }
    button:disabled { opacity:0.5; cursor:default; }
    .ultimate { background:#9b59b6 !important; }
    input { padding:14px; font-size:18px; width:75%; border-radius:10px; border:none; }
    .hearts { font-size:34px; margin:12px 0; letter-spacing:6px; }
    .enemy-hp { font-size:26px; color:#e74c3c; margin:12px 0; }
    .mana { font-size:21px; color:#5dade2; }
    .log { background:#121212; padding:20px; margin:20px 0; min-height:170px; text-align:left; border-radius:12px; font-size:15.5px; line-height:1.65; color:#ddd; }
    .menu { position:fixed; top:18px; right:18px; background:#222; padding:10px; border-radius:12px; }
    .star { color:#ffcc00; font-size:24px; }
    .story { font-size:15px; color:#ccc; font-style:italic; background:#161616; padding:12px 14px; border-radius:10px; margin:12px 0; text-align:left; border-left:3px solid #e74c3c; }
    .spinner { display:inline-block; width:26px; height:26px; border:3px solid #444; border-top:3px solid #e74c3c; border-radius:50%; animation:spin 0.8s linear infinite; margin-top:10px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .scene-photo { width:100%; max-width:460px; height:180px; object-fit:cover; border-radius:12px; margin-bottom:14px; display:block; }
    .rhythm-bar { position:relative; height:38px; background:#222; border-radius:8px; margin:22px 6px; overflow:hidden; border:2px solid #444; }
    .rhythm-zone { position:absolute; left:40%; width:20%; height:100%; background:rgba(46,204,113,0.55); }
    .rhythm-marker { position:absolute; top:0; width:6px; height:100%; background:#fff; left:0%; box-shadow:0 0 8px #fff; }
</style>
</head>
<body>

<div class="menu">
    <button onclick="showMenu()">메뉴</button>
</div>

<div id="game"></div>

<script>
// ==================== 상태 ====================
let nickname = "", playerClass = "", playerWeapon = "", classGrade = 2;
let hearts = 5, score = 0, mana = 40;
let difficulty = "normal";
let logMessages = [];
let inventory = [];
let playTime = 0;
let timerInterval = null;
let enemyHP = 0;
let enemyMaxHP = 2;
let isDefending = false;
let defendMultiplier = 1;

let rhythmInterval = null;
let rhythmPos = 0;
let rhythmDir = 1;
let pendingAction = null;
let storyLog = [];
let currentStory = "";

const settings = {
    easy:   { enemyHP: 2, enemyDmg: 0.3, playerDmg: 1.3, manaRegen: 7 },
    normal: { enemyHP: 2, enemyDmg: 0.45, playerDmg: 1.0, manaRegen: 5 },
    hard:   { enemyHP: 3, enemyDmg: 0.6, playerDmg: 0.85, manaRegen: 3 }
};

const attackPools = {
    "전사": [
        {name: "강력 베기", dmg: 1.1, cost: 0},
        {name: "도끼 내려찍기", dmg: 1.8, cost: 35},
        {name: "방패 돌진", dmg: 1.5, cost: 30},
        {name: "광전사 일격", dmg: 2.6, cost: 70},
        {name: "최후의 일격", dmg: 3.9, cost: 95}
    ],
    "궁수": [
        {name: "정조준 사격", dmg: 1.0, cost: 0},
        {name: "연발 화살", dmg: 1.6, cost: 35},
        {name: "폭풍 화살", dmg: 2.7, cost: 65},
        {name: "궁극 관통", dmg: 4.1, cost: 95}
    ],
    "마법사": [
        {name: "마법 화살", dmg: 1.2, cost: 0},
        {name: "불꽃 폭발", dmg: 1.9, cost: 40},
        {name: "메테오", dmg: 4.6, cost: 95}
    ],
    "도적": [
        {name: "기습 단검", dmg: 1.3, cost: 0},
        {name: "그림자 베기", dmg: 1.7, cost: 30},
        {name: "절대 암살", dmg: 3.8, cost: 95}
    ]
};

function addLog(msg) {
    logMessages.unshift("• " + msg);
    if(logMessages.length > 8) logMessages.pop();
}

function updateScreen(html) {
    document.getElementById("game").innerHTML = html;
}

function getHeartsHTML() {
    return "❤️".repeat(Math.floor(hearts)) + "♡".repeat(5 - Math.floor(hearts));
}

function getEnemyHeartsHTML() {
    return "❤️".repeat(Math.max(0, Math.ceil(enemyHP))) + "♡".repeat(Math.max(0, enemyMaxHP - Math.ceil(enemyHP)));
}

function scenePhotoURL(seedText){
    const seed = encodeURIComponent(seedText + "-" + Math.floor(Math.random()*100000));
    return `https://picsum.photos/seed/${seed}/460/220`;
}

// ==================== AI 선택지 생성 ====================
async function callClaudeAPI(promptText) {
    try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "claude-sonnet-4-6",
                max_tokens: 400,
                messages: [{ role: "user", content: promptText }]
            })
        });
        const data = await response.json();
        const text = (data.content || []).map(b => b.text || "").join("");
        return text;
    } catch (e) {
        console.error("AI 호출 실패", e);
        return null;
    }
}

function parseJSONSafe(text) {
    if (!text) return null;
    try {
        const cleaned = text.replace(/```json/g, "").replace(/```/g, "").trim();
        return JSON.parse(cleaned);
    } catch (e) {
        return null;
    }
}

function loadingCard(title, sub) {
    updateScreen(`
    <div class="card">
        <h2>${title}</h2>
        <div class="hearts">${getHeartsHTML()}</div>
        <div class="mana">마나: ${mana}</div>
        <div class="log">${sub || "AI가 상황을 생성하는 중"}<br><span class="spinner"></span></div>
    </div>`);
}

// ==================== 시작 ====================
function startScreen(){
    updateScreen(`
    <div class="card">
        <h1>🧟 Soul Breaker</h1>
        <p>영혼을 삼키는 세계</p>
        <input id="nick" placeholder="이름 입력" maxlength="12">
        <br><br>
        <button onclick="selectDifficulty()">시작하기</button>
    </div>`);
}

function selectDifficulty(){
    nickname = document.getElementById("nick").value.trim();
    if(!nickname) return alert("이름을 입력하세요.");
    updateScreen(`
    <div class="card">
        <h2>난이도 선택</h2>
        <button onclick="setDifficulty('easy')">이지</button>
        <button onclick="setDifficulty('normal')">보통</button>
        <button onclick="setDifficulty('hard')">하드</button>
    </div>`);
}

function setDifficulty(mode){
    difficulty = mode;
    showGacha();
}

function showGacha(){
    updateScreen(`
    <div class="card">
        <h2>🎲 운명 뽑기</h2>
        <button onclick="roll()">뽑기</button>
    </div>`);
}

function roll(){
    const classes = ["전사","궁수","마법사","도적"];
    playerClass = classes[Math.floor(Math.random()*classes.length)];
    classGrade = Math.floor(Math.random()*3) + 1;

    let weapons = playerClass === "전사" ? ["대검","도끼"] :
                  playerClass === "궁수" ? ["장궁","석궁"] :
                  playerClass === "마법사" ? ["지팡이","마법서"] : ["단검","비수"];

    playerWeapon = weapons[Math.floor(Math.random()*weapons.length)];

    updateScreen(`
    <div class="card">
        <h2>🎉 당신의 운명</h2>
        <h3>${playerClass} / ${playerWeapon}</h3>
        <p class="star">${"★".repeat(classGrade)} ${classGrade}성</p>
        <button onclick="startAdventure()">모험 시작</button>
    </div>`);
}

function startAdventure(){
    mana = 50;
    storyLog = [];
    currentStory = "";
    startTimer();
    explore();
}

function startTimer(){
    playTime = 0;
    timerInterval = setInterval(() => { playTime++; mana = Math.min(100, mana + settings[difficulty].manaRegen); }, 1000);
}

// ==================== 탐험 ====================
const exploreDefaults = [
    {type:"search", label:"탐색한다"},
    {type:"rest", label:"휴식한다"},
    {type:"move", label:"이동한다"},
    {type:"hide", label:"은신한다"}
];
const npcDefaults = {
    talk: "대화한다", trade: "거래한다", steal: "위험한 행동", info: "정보를 캔다"
};

function explore(){
    logMessages = [];
    const rand = Math.random();

    if(rand < 0.35){
        const npcs = [{name:"🧙 상인", key:"merchant"}, {name:"😈 수상한 자", key:"stranger"}, {name:"👤 생존자", key:"survivor"}];
        showNpcEvent(npcs[Math.floor(Math.random()*npcs.length)]);
    } else if(rand < 0.6){
        enemyMaxHP = 3;
        enemyHP = enemyMaxHP;
        isDefending = false;
        addLog("🧟 적이 나타났다!");
        showFight();
    } else {
        loadingCard("🌲 폐허 탐험");
        generateExploreOptions();
    }
}

async function generateExploreOptions(){
    const history = storyLog.length ? storyLog.slice(-4).join(" → ") : "이야기가 막 시작되었다.";
    const prompt = `당신은 좀비 아포칼립스 생존 게임의 게임마스터입니다. 이야기는 매 장면마다 이어져야 합니다.
캐릭터: ${nickname} (${playerClass}, 무기: ${playerWeapon}), 난이도: ${difficulty}, 체력 ${hearts}/5, 마나 ${mana}, 점수 ${score}.
지금까지의 줄거리: ${history}
지금은 폐허를 탐험하는 새로운 장면입니다. 앞의 줄거리에 자연스럽게 이어지는 1~2문장짜리 짧은 장면 묘사(story)를 한국어로 써주세요.
그리고 아래 4가지 행동 타입 각각에 대해, 이 장면에 어울리는 몰입감 있는 한국어 버튼 문구를 하나씩 만들어주세요 (6~14자, 이모지 1개 포함 가능).
타입은 반드시 이 순서와 이름을 그대로 유지하세요: search(위험을 감수하고 무언가를 찾는다), rest(안전하게 휴식한다), move(다른 곳으로 이동한다), hide(조용히 숨어 기회를 엿본다).
다른 설명 없이 아래 JSON 형식으로만 응답하세요:
{"story":"...", "options":[{"type":"search","label":"..."},{"type":"rest","label":"..."},{"type":"move","label":"..."},{"type":"hide","label":"..."}]}`;

    const raw = await callClaudeAPI(prompt);
    let parsed = parseJSONSafe(raw);
    let options = parsed && Array.isArray(parsed.options) ? parsed.options : null;
    if(!Array.isArray(options) || options.length < 4 || !options.every(o => o && o.type && o.label)){
        options = exploreDefaults;
    }
    currentStory = (parsed && parsed.story) ? parsed.story : "폐허 속을 조심스럽게 걸어간다.";
    storyLog.push(currentStory);
    renderExplore(options);
}

function renderExplore(options){
    const buttons = options.map(o => `<button onclick="act('${o.type}')">${o.label}</button>`).join("");
    updateScreen(`
    <div class="card">
        <h2>🌲 폐허 탐험</h2>
        <p class="story">${currentStory}</p>
        <div class="hearts">${getHeartsHTML()}</div>
        <div class="mana">마나: ${mana}</div>
        <div class="log">${logMessages.join('<br>')}</div>
        ${buttons}
    </div>`);
}

function showNpcEvent(n){
    loadingCard(n.name, "다가가는 중");
    generateNpcOptions(n);
}

async function generateNpcOptions(n){
    const desc = n.key === "merchant" ? "거래를 제안하는 상인" : n.key === "stranger" ? "수상하게 다가오는 낯선 자" : "도움을 요청하는 생존자";
    const history = storyLog.length ? storyLog.slice(-4).join(" → ") : "이야기가 막 시작되었다.";
    const prompt = `당신은 좀비 아포칼립스 생존 게임의 게임마스터입니다. 이야기는 매 장면마다 이어져야 합니다.
캐릭터: ${nickname} (${playerClass}), 지금까지의 줄거리: ${history}
지금 만난 NPC는 "${desc}"입니다. 앞의 줄거리에 자연스럽게 이어지는 1~2문장짜리 짧은 장면 묘사(story)를 한국어로 써주세요.
그리고 아래 4가지 행동 타입 각각에 대해 상황에 어울리는 한국어 버튼 문구를 하나씩 만들어주세요 (5~14자).
타입은 반드시 이 순서와 이름을 유지하세요: talk(대화를 나눈다), trade(물건을 거래한다), steal(위험을 무릅쓰고 무언가를 시도한다), info(정보를 캐낸다).
다른 설명 없이 아래 JSON 형식으로만 응답하세요:
{"story":"...", "options":[{"type":"talk","label":"..."},{"type":"trade","label":"..."},{"type":"steal","label":"..."},{"type":"info","label":"..."}]}`;

    const raw = await callClaudeAPI(prompt);
    let parsed = parseJSONSafe(raw);
    let options = parsed && Array.isArray(parsed.options) ? parsed.options : null;
    if(!Array.isArray(options) || options.length < 4 || !options.every(o => o && o.type && o.label)){
        options = Object.keys(npcDefaults).map(t => ({type:t, label:npcDefaults[t]}));
    }
    currentStory = (parsed && parsed.story) ? parsed.story : desc + "와 마주쳤다.";
    storyLog.push(currentStory);
    renderNpc(n, options);
}

function renderNpc(n, options){
    const buttons = options.map(o => `<button onclick="npcAction('${o.type}','${n.key}')">${o.label}</button>`).join("");
    updateScreen(`
    <div class="card">
        <h2>${n.name}</h2>
        <p class="story">${currentStory}</p>
        <div class="hearts">${getHeartsHTML()}</div>
        <div class="mana">마나: ${mana}</div>
        <div class="log">${logMessages.join('<br>')}</div>
        ${buttons}
    </div>`);
}

function npcAction(action, key){
    let msg = "";
    if(action === "talk"){ score += 25; msg = "의미 있는 대화를 나누었다."; }
    else if(action === "trade"){
        if(score >= 20){ score -= 20; inventory.push("회복물약"); msg = "회복물약을 얻었다!"; }
        else msg = "점수가 부족하다.";
    } else if(action === "steal"){
        if(Math.random() < 0.6){ inventory.push("귀중품"); score += 45; msg = "훔치기 성공!"; }
        else { hearts -= 0.5; msg = "실패하고 피해를 입었다."; }
    } else {
        if(Math.random() < 0.5){ mana = Math.min(100, mana + 20); msg = "유용한 정보를 얻어 마나가 회복됐다."; }
        else { score += 10; msg = "잡담뿐이었지만 약간의 경험을 얻었다."; }
    }
    addLog(msg);
    storyLog.push(msg);
    explore();
}

function act(action){
    if(action === "search"){
        if(Math.random() < 0.65){ score += 30; inventory.push("유물"); addLog("💎 유물을 발견했다!"); }
        else { hearts -= 0.5; addLog("⚠️ 위험한 함정!"); }
    } else if(action === "rest"){
        hearts = Math.min(5, hearts + 0.5); addLog("😌 체력을 회복했다.");
    } else if(action === "hide"){
        mana = Math.min(100, mana + 15);
        if(Math.random() < 0.3){ score += 15; inventory.push("작은 단서"); addLog("🕶️ 조용히 숨어 작은 단서를 발견했다."); }
        else addLog("🕶️ 조용히 숨어 마나를 회복했다.");
    } else {
        addLog("👣 조심스럽게 이동했다.");
    }
    if(logMessages[0]) storyLog.push(logMessages[0].replace("• ", ""));
    explore();
}

// ==================== 전투 ====================
function showFight(){
    const photo = scenePhotoURL("zombie-encounter-" + difficulty);
    updateScreen(`
    <div class="card">
        <h2>⚔ 전투</h2>
        <img class="scene-photo" src="${photo}" alt="전투 현장">
        <div class="hearts">${getHeartsHTML()}</div>
        <div class="mana">마나: ${mana}</div>
        <div class="enemy-hp">적 체력: ${getEnemyHeartsHTML()} (${enemyHP.toFixed(1)}/${enemyMaxHP})</div>
        <div class="log">${logMessages.join('<br>')}</div>
        <button onclick="playerTurn()">내 턴</button>
    </div>`);
}

function playerTurn(){
    const pool = attackPools[playerClass] || attackPools["전사"];
    const selected = [...pool].sort(() => Math.random() - 0.5).slice(0, 3).filter(att => mana >= att.cost);

    loadingCard("⚔ 내 턴", "전투 기술을 가다듬는 중");
    generateCombatLabels(selected);
}

async function generateCombatLabels(selected){
    if(selected.length === 0){
        renderCombat(selected, []);
        return;
    }
    const list = selected.map((a,i) => `${i+1}. 기존이름:"${a.name}" 데미지:${a.dmg} 마나소모:${a.cost}`).join("\n");
    const prompt = `당신은 액션 게임의 전투 연출 작가입니다.
캐릭터: ${nickname} (${playerClass}, 무기: ${playerWeapon}).
아래는 이번 턴에 사용 가능한 공격 3개(또는 그 이하) 목록입니다:
${list}
각 공격의 데미지와 마나소모는 그대로 두고, 더 박진감 있고 개성있는 새로운 한국어 기술 이름만 지어주세요 (4~10자, 이모지 1개 포함 가능). 순서는 유지하세요.
다른 설명 없이 아래 JSON 배열 형식으로만 응답하세요 (개수는 목록과 동일하게):
["이름1","이름2","이름3"]`;

    const raw = await callClaudeAPI(prompt);
    let labels = parseJSONSafe(raw);
    if(!Array.isArray(labels) || labels.length < selected.length){
        labels = selected.map(a => a.name);
    }
    renderCombat(selected, labels);
}

function renderCombat(selected, labels){
    let buttons = selected.map((att, i) => {
        const label = (labels[i] || att.name).replace(/'/g, "");
        const manaText = att.cost > 0 ? `, 마나 ${att.cost}` : ", 마나 소모 없음";
        const isUltimate = att.cost >= 90;
        const cls = isUltimate ? 'class="ultimate"' : '';
        const action = isUltimate
            ? `startAttackRhythm(${att.dmg}, ${att.cost}, '${label}')`
            : `executeAttack(${att.dmg}, ${att.cost}, '${label}')`;
        const tag = isUltimate ? " 🎵필살기" : "";
        return `<button onclick="${action}" ${cls}>${label}${tag} (dmg ${att.dmg}${manaText})</button>`;
    }).join("");

    buttons += `<button onclick="startDefendRhythm()">🛡️🎵 방어한다</button>`;
    if(inventory.includes("회복물약")){
        buttons += `<button onclick="useHealPotion()">💊 회복물약 사용</button>`;
    }

    updateScreen(`
    <div class="card">
        <h2>⚔ 내 턴</h2>
        <div class="hearts">${getHeartsHTML()}</div>
        <div class="mana">마나: ${mana}</div>
        <div class="enemy-hp">적 체력: ${getEnemyHeartsHTML()} (${enemyHP.toFixed(1)}/${enemyMaxHP})</div>
        <div class="log">${logMessages.join('<br>')}</div>
        ${buttons}
    </div>`);
}

function executeAttack(dmg, cost, name){
    if(cost > 0) mana -= cost;
    enemyHP -= dmg;
    addLog(`${name}! ${dmg.toFixed(1)} 데미지`);

    if(enemyHP <= 0){
        score += 70;
        addLog("🎉 적을 처치했다!");
        storyLog.push(`${nickname}이(가) 좀비를 처치하고 살아남았다.`);
        setTimeout(explore, 900);
    } else {
        setTimeout(enemyAttack, 800);
    }
}

// ==================== 리듬 게임 (필살기 / 방어) ====================
function startAttackRhythm(dmg, cost, name){
    if(cost > 0) mana -= cost;
    pendingAction = {type:"attack", dmg:dmg, name:name};
    launchRhythm(`⚡ ${name} - 타이밍을 맞춰라!`);
}

function startDefendRhythm(){
    pendingAction = {type:"defend"};
    launchRhythm("🛡️ 방어 타이밍!");
}

function launchRhythm(title){
    rhythmPos = 0;
    rhythmDir = 1;
    updateScreen(`
    <div class="card">
        <h2>${title}</h2>
        <p>초록 구간에서 버튼을 눌러야 성공!</p>
        <div class="rhythm-bar" id="rhythmBar">
            <div class="rhythm-zone"></div>
            <div class="rhythm-marker" id="rhythmMarker"></div>
        </div>
        <button onclick="hitRhythm()">지금 누르기!</button>
    </div>`);
    if(rhythmInterval) clearInterval(rhythmInterval);
    const speed = difficulty === "hard" ? 7 : difficulty === "easy" ? 4 : 5.5;
    rhythmInterval = setInterval(() => {
        rhythmPos += rhythmDir * speed;
        if(rhythmPos >= 100){ rhythmPos = 100; rhythmDir = -1; }
        if(rhythmPos <= 0){ rhythmPos = 0; rhythmDir = 1; }
        const marker = document.getElementById("rhythmMarker");
        if(marker) marker.style.left = rhythmPos + "%";
    }, 40);
}

function hitRhythm(){
    if(rhythmInterval){ clearInterval(rhythmInterval); rhythmInterval = null; }
    const success = rhythmPos >= 40 && rhythmPos <= 60;
    resolveRhythm(success);
}

function resolveRhythm(success){
    const action = pendingAction;
    pendingAction = null;

    if(action.type === "attack"){
        if(success){
            addLog("🎯 타이밍 성공! 필살기 완벽 적중!");
            executeAttack(action.dmg, 0, action.name);
        } else {
            addLog("💢 타이밍 실패... 위력이 크게 줄었다.");
            executeAttack(action.dmg * 0.4, 0, action.name);
        }
    } else if(action.type === "defend"){
        isDefending = true;
        if(success){
            defendMultiplier = 0.3;
            mana = Math.min(100, mana + 10);
            addLog("🛡️ 완벽한 타이밍! 방어 강화 (피해 70% 감소)");
        } else {
            defendMultiplier = 0.75;
            addLog("🛡️ 타이밍을 놓쳐 방어가 약해졌다 (피해 25% 감소)");
        }
        setTimeout(enemyAttack, 800);
    }
}

function useHealPotion(){
    const idx = inventory.indexOf("회복물약");
    if(idx === -1){ addLog("회복물약이 없다."); playerTurn(); return; }
    inventory.splice(idx, 1);
    hearts = Math.min(5, hearts + 1.5);
    addLog("💊 회복물약을 사용해 체력을 회복했다.");
    setTimeout(enemyAttack, 800);
}

function enemyAttack(){
    let dmg = settings[difficulty].enemyDmg;
    if(isDefending){ dmg = dmg * defendMultiplier; isDefending = false; defendMultiplier = 1; }
    hearts -= dmg;
    addLog(`적의 공격! 하트 ${dmg.toFixed(1)} 소멸`);
    if(hearts <= 0) gameOver();
    else setTimeout(playerTurn, 900);
}

function gameOver(){
    if(timerInterval) clearInterval(timerInterval);
    if(rhythmInterval) clearInterval(rhythmInterval);
    updateScreen(`
    <div class="card">
        <h1>💀 GAME OVER</h1>
        <p>최종 점수: <b>${score}</b></p>
        <button onclick="startScreen()">다시 시작</button>
    </div>`);
}

function showMenu(){
    updateScreen(`
    <div class="card">
        <h2>메뉴</h2>
        <button onclick="showInventory()">인벤토리</button>
        <button onclick="explore()">돌아가기</button>
    </div>`);
}

function showInventory(){
    updateScreen(`
    <div class="card">
        <h2>🎒 인벤토리</h2>
        <p>${inventory.length ? inventory.join("<br>") : "비어있음"}</p>
        <button onclick="showMenu()">닫기</button>
    </div>`);
}

// 게임 시작
startScreen();
</script>
</body>
</html>
