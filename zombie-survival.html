<!DOCTYPE html>
<index.html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🧟‍♂️ ZOMBIE SURVIVAL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg: #0a0c0a;
    --bg-panel: #12150f;
    --bg-card: #171b14;
    --line: #2a3024;
    --text: #dfe6d5;
    --text-dim: #7d8a72;
    --blood: #b3272c;
    --blood-bright: #e63946;
    --toxic: #7fb069;
    --gold: #d9a441;
    --purple: #9b6bd9;
    --common: #8a9a80;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%; background:var(--bg); color:var(--text);
    font-family:'JetBrains Mono', monospace; overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
  }
  #app{
    max-width:480px; margin:0 auto; min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; position:relative;
    background:
      radial-gradient(ellipse at top, rgba(179,39,44,0.06), transparent 60%),
      var(--bg);
    padding-bottom: env(safe-area-inset-bottom);
  }
  /* scanline / crt static signature texture */
  #app::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:999;
    max-width:480px; margin:0 auto;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: overlay;
  }
  h1,h2,h3{font-family:'Oswald',sans-serif; margin:0; letter-spacing:0.02em;}
  ::-webkit-scrollbar{display:none;}

  /* ---------- STATUS BAR ---------- */
  #statusbar{
    display:none; padding:10px 12px 8px; background:var(--bg-panel); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20;
  }
  #statusbar .row1{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  #statusbar .name{font-family:'Oswald',sans-serif; font-weight:600; font-size:15px; color:var(--text);}
  #statusbar .lvl{font-size:11px; color:var(--gold);}
  .bars{display:flex; flex-direction:column; gap:4px;}
  .barline{display:flex; align-items:center; gap:6px; font-size:10px; color:var(--text-dim);}
  .barline .label{width:34px; flex-shrink:0;}
  .bartrack{flex:1; height:6px; background:#1c211a; border-radius:3px; overflow:hidden; border:1px solid var(--line);}
  .barfill{height:100%; border-radius:3px; transition:width .3s;}
  .fill-hp{background:linear-gradient(90deg,#7a1519,var(--blood-bright));}
  .fill-hunger{background:linear-gradient(90deg,#8a6a1c,var(--gold));}
  .fill-fatigue{background:linear-gradient(90deg,#4a5a8a,#7a93d9);}
  .fill-infect{background:linear-gradient(90deg,#2e5a1f,var(--toxic));}
  .statnums{display:flex; gap:10px; margin-top:6px; font-size:10px; color:var(--text-dim); flex-wrap:wrap;}
  .statnums b{color:var(--text);}

  /* ---------- MAIN CONTENT ---------- */
  #screen{flex:1; padding:16px 14px 90px; overflow-y:auto;}
  .center-screen{display:flex; flex-direction:column; justify-content:center; min-height:calc(100vh - 20px); min-height:calc(100dvh - 20px);}

  /* Title screen */
  .titlewrap{text-align:center; padding-top:8vh;}
  .titlewrap .emoji{font-size:54px; filter:drop-shadow(0 0 14px rgba(230,57,70,0.5));}
  .titlewrap h1{font-size:30px; color:var(--text); margin-top:10px; text-transform:uppercase;}
  .titlewrap .sub{color:var(--blood-bright); font-size:12px; letter-spacing:0.3em; margin-top:4px;}
  .divider{border:none; border-top:1px dashed var(--line); margin:22px 0;}

  .menu-btn{
    display:flex; align-items:center; gap:12px; width:100%; padding:16px 16px;
    margin-bottom:10px; background:var(--bg-card); border:1px solid var(--line); border-radius:10px;
    color:var(--text); font-family:'Oswald',sans-serif; font-size:16px; font-weight:500;
    text-align:left; letter-spacing:0.02em; cursor:pointer; transition:transform .08s, border-color .15s;
  }
  .menu-btn:active{transform:scale(0.97); border-color:var(--blood);}
  .menu-btn .num{color:var(--text-dim); font-family:'JetBrains Mono'; font-size:13px; width:16px;}
  .menu-btn.danger{border-color:rgba(179,39,44,0.4); color:#e0a3a3;}

  /* Cards */
  .card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:16px;
    margin-bottom:12px;
  }
  .card.rare{border-color:var(--purple); box-shadow:0 0 18px rgba(155,107,217,0.15);}
  .card.legend{border-color:var(--gold); box-shadow:0 0 22px rgba(217,164,65,0.22);}
  .rarity-tag{display:inline-block; font-size:10px; padding:2px 8px; border-radius:20px; font-family:'Oswald'; letter-spacing:0.05em;}
  .rarity-common{background:rgba(138,154,128,0.15); color:var(--common);}
  .rarity-rare{background:rgba(155,107,217,0.18); color:var(--purple);}
  .rarity-legend{background:rgba(217,164,65,0.18); color:var(--gold);}

  /* Log / narrative */
  .story-log{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; padding:14px;
    font-size:13.5px; line-height:1.65; color:var(--text); margin-bottom:14px; min-height:80px;
    white-space:pre-wrap;
  }
  .story-log .tag{color:var(--blood-bright); font-size:11px; letter-spacing:0.1em; display:block; margin-bottom:6px;}

  /* Choice buttons (bottom action area) */
  #actionbar{
    position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
    background:linear-gradient(180deg, transparent, var(--bg) 22%);
    padding:10px 14px calc(12px + env(safe-area-inset-bottom)); z-index:30;
    display:none; flex-direction:column; gap:8px;
  }
  .choice-btn{
    width:100%; padding:14px 14px; background:var(--bg-card); border:1px solid var(--line); border-radius:10px;
    color:var(--text); font-size:14px; font-family:'Oswald',sans-serif; font-weight:500; text-align:left;
    display:flex; justify-content:space-between; align-items:center; cursor:pointer;
  }
  .choice-btn:active{background:#1e2419; border-color:var(--toxic);}
  .choice-btn.primary{border-color:var(--blood); background:rgba(179,39,44,0.12);}
  .choice-btn.warn{border-color:var(--gold); background:rgba(217,164,65,0.08);}
  .choice-btn .arrow{color:var(--text-dim); font-size:12px;}

  /* Bottom nav */
  #bottomnav{
    display:none; justify-content:space-around; align-items:center; padding:8px 4px calc(6px + env(safe-area-inset-bottom));
    background:var(--bg-panel); border-top:1px solid var(--line); position:sticky; bottom:0; z-index:25;
  }
  .navbtn{background:none; border:none; color:var(--text-dim); font-family:'JetBrains Mono'; font-size:10px; display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 6px; cursor:pointer;}
  .navbtn .ic{font-size:18px;}
  .navbtn.active{color:var(--toxic);}

  .toast{
    position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:200;
    background:var(--bg-card); border:1px solid var(--toxic); color:var(--text); padding:10px 16px;
    border-radius:8px; font-size:12.5px; max-width:88%; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.5);
    animation:fadein .2s ease;
  }
  @keyframes fadein{from{opacity:0; transform:translate(-50%,-8px);} to{opacity:1; transform:translate(-50%,0);}}

  input[type=text]{
    width:100%; padding:14px; background:var(--bg-panel); border:1px solid var(--line); border-radius:8px;
    color:var(--text); font-family:'JetBrains Mono'; font-size:15px; margin-bottom:10px;
  }
  input[type=text]:focus{outline:none; border-color:var(--toxic);}

  .small-label{font-size:11px; color:var(--text-dim); margin-bottom:6px; letter-spacing:0.05em;}
  .row-between{display:flex; justify-content:space-between; align-items:center;}
  .pill{font-size:10px; padding:3px 8px; border-radius:20px; background:var(--bg-panel); border:1px solid var(--line); color:var(--text-dim);}

  .rank-row{display:flex; align-items:center; gap:10px; padding:10px 8px; border-bottom:1px solid var(--line);}
  .rank-row.me{background:rgba(127,176,105,0.08); border-radius:8px; border-bottom:1px solid transparent;}
  .rank-num{width:26px; text-align:center; font-family:'Oswald'; font-weight:600; color:var(--gold); font-size:14px;}
  .rank-info{flex:1;}
  .rank-info .nick{font-size:13.5px; color:var(--text);}
  .rank-info .meta{font-size:10px; color:var(--text-dim);}
  .rank-score{font-family:'Oswald'; color:var(--toxic); font-size:13px;}

  .friend-row{display:flex; align-items:center; gap:10px; padding:12px 10px; background:var(--bg-card); border:1px solid var(--line); border-radius:10px; margin-bottom:8px;}
  .friend-avatar{width:36px; height:36px; border-radius:50%; background:var(--bg-panel); display:flex; align-items:center; justify-content:center; font-size:16px; border:1px solid var(--line);}
  .badge-req{font-size:9px; background:var(--blood); color:#fff; padding:2px 6px; border-radius:10px;}

  .backbtn{color:var(--text-dim); font-size:12px; margin-bottom:14px; display:inline-flex; align-items:center; gap:4px; cursor:pointer;}
  .inv-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .inv-item{background:var(--bg-card); border:1px solid var(--line); border-radius:10px; padding:10px; font-size:12px;}
  .inv-item .iname{font-family:'Oswald'; font-size:13px; margin-bottom:3px;}
  .inv-item .qty{color:var(--gold); font-size:11px;}
  .usebtn{margin-top:6px; width:100%; padding:6px; background:var(--bg-panel); border:1px solid var(--line); border-radius:6px; color:var(--toxic); font-size:11px;}

  .progress-dots{display:flex; gap:6px; justify-content:center; margin-bottom:18px;}
  .dot{width:6px; height:6px; border-radius:50%; background:var(--line);}
  .dot.on{background:var(--toxic);}
  .skip-link{position:absolute; top:0; right:0; font-size:11px; color:var(--text-dim);}
</style>
</head>
<body>
<div id="app">
  <div id="statusbar">
    <div class="row1">
      <div class="name" id="sb-name">-</div>
      <div class="lvl" id="sb-lvl">Lv.1</div>
    </div>
    <div class="bars">
      <div class="barline"><span class="label">체력</span><div class="bartrack"><div class="barfill fill-hp" id="bar-hp" style="width:100%"></div></div><span id="txt-hp">100</span></div>
      <div class="barline"><span class="label">배고픔</span><div class="bartrack"><div class="barfill fill-hunger" id="bar-hunger" style="width:100%"></div></div><span id="txt-hunger">100</span></div>
      <div class="barline"><span class="label">피로</span><div class="bartrack"><div class="barfill fill-fatigue" id="bar-fatigue" style="width:0%"></div></div><span id="txt-fatigue">0</span></div>
      <div class="barline"><span class="label">감염</span><div class="bartrack"><div class="barfill fill-infect" id="bar-infect" style="width:0%"></div></div><span id="txt-infect">0</span></div>
    </div>
    <div class="statnums">
      <span>⚔ <b id="sb-atk">-</b></span>
      <span>🛡 <b id="sb-def">-</b></span>
      <span>🧭 <b id="sb-explore">-</b></span>
      <span>⭐ <b id="sb-score">0</b></span>
      <span>💰 <b id="sb-gold">0</b></span>
    </div>
  </div>

  <div id="screen"></div>
  <div id="actionbar"></div>

  <div id="bottomnav">
    <button class="navbtn" data-nav="home"><span class="ic">🏠</span>홈</button>
    <button class="navbtn" data-nav="inventory"><span class="ic">🎒</span>인벤토리</button>
    <button class="navbtn" data-nav="quest"><span class="ic">📋</span>퀘스트</button>
    <button class="navbtn" data-nav="ranking"><span class="ic">🏆</span>랭킹</button>
    <button class="navbtn" data-nav="friends"><span class="ic">👥</span>친구</button>
  </div>
</div>

<script>
/* =========================================================
   🧟 ZOMBIE SURVIVAL — 클라이언트 전용 텍스트 RPG 데모
   실서비스 배포시 저장/랭킹/친구는 Express+Upstash Redis API로
   교체하도록 설계되어 있음 (아래 DataAPI 객체가 그 경계선).
   지금은 artifact 환경의 window.storage로 동작(개인=personal,
   랭킹/친구=shared)하여 즉시 플레이 가능하게 구현.
   ========================================================= */

const $ = sel => document.querySelector(sel);
const screen = $('#screen');
const actionbar = $('#actionbar');
const statusbar = $('#statusbar');
const bottomnav = $('#bottomnav');

// ---------------- DATA: 직업 / 무기 / 지역 / 아이템 / 퀘스트 / 업적 ----------------
const JOBS = {
  common: [
    {id:'survivor', name:'생존자', desc:'평범하지만 끈질기다. 기본 생존 능력이 뛰어나다.', hp:8, atk:0, def:1, explore:0},
    {id:'scout', name:'정찰병', desc:'발이 빠르고 눈치가 빠르다. 탐험과 도주에 능하다.', hp:2, atk:0, def:0, explore:3, flee:8},
    {id:'engineer', name:'기술자', desc:'손재주가 좋아 아이템과 함정을 잘 다룬다.', hp:2, atk:0, def:2, explore:1, itemBonus:0.15},
  ],
  rare: [
    {id:'medic', name:'의무병', desc:'회복 아이템 효율이 뛰어나고 상태이상을 잘 회복한다.', hp:6, atk:1, def:2, healBonus:0.4},
    {id:'hunter', name:'사냥꾼', desc:'명중률이 높고 야외 탐험에서 강하다.', hp:4, atk:4, def:1, explore:2, hitBonus:0.15},
    {id:'quartermaster', name:'보급병', desc:'아이템 획득량이 많고 희귀 보급상자를 더 잘 찾는다.', hp:5, atk:1, def:2, lootBonus:0.3},
  ],
  legend: [
    {id:'specialforce', name:'특수부대원', desc:'전투 능력이 압도적이며 초반 생존력이 매우 높다.', hp:14, atk:8, def:5},
    {id:'expert', name:'생존 전문가', desc:'탐험·회복·도주·자원수집 전반이 강화된 만능형.', hp:8, atk:3, def:3, explore:4, healBonus:0.2, flee:10},
    {id:'analyst', name:'바이러스 분석가', desc:'특정 지역 이벤트에서 강력한 보너스와 보상 해석력을 지녔다.', hp:6, atk:2, def:2, explore:2, lootBonus:0.25},
  ]
};
const WEAPONS = {
  common: [
    {id:'bat', name:'야구방망이', grade:'일반', atk:5, durability:20, effect:'기본형 근접무기', role:'근접'},
    {id:'pipe', name:'쇠파이프', grade:'일반', atk:6, durability:18, effect:'묵직한 일격', role:'근접'},
    {id:'hatchet', name:'손도끼', grade:'일반', atk:7, durability:14, effect:'추가 출혈 효과', role:'근접', bleed:true},
  ],
  rare: [
    {id:'huntknife', name:'사냥용 칼', grade:'희귀', atk:9, durability:16, effect:'첫 타격 보너스 +30%', role:'근접', firstHit:0.3},
    {id:'pistol', name:'권총', grade:'희귀', atk:12, durability:12, effect:'원거리, 명중률 우수', role:'원거리'},
    {id:'taser', name:'전기충격기', grade:'희귀', atk:6, durability:8, effect:'도주 성공률 +25%', role:'특수', fleeBonus:0.25},
  ],
  legend: [
    {id:'shotgun', name:'산탄총', grade:'전설', atk:20, durability:8, effect:'좀비 다수전 보너스', role:'원거리', mobBonus:true},
    {id:'improvised', name:'임시 제작 무기', grade:'전설', atk:16, durability:10, effect:'보스전 보정 +20%', role:'특수', bossBonus:0.2},
  ]
};
const REGIONS = [
  {id:'school', name:'학교', icon:'🏫', desc:'무너진 교실 사이로 낙서와 핏자국이 뒤섞여 있다.'},
  {id:'hospital', name:'병원', icon:'🏥', desc:'약품 냄새 대신 부패한 냄새가 복도를 채운다.'},
  {id:'mart', name:'마트', icon:'🏪', desc:'진열대가 쓰러진 채 방치되어 있다. 아직 남은 것이 있을까.'},
  {id:'subway', name:'지하철역', icon:'🚇', desc:'어둠 속에서 무언가 움직이는 소리가 들린다.'},
  {id:'apartment', name:'폐아파트', icon:'🏚', desc:'창문마다 커튼이 찢겨 바람에 흔들린다.'},
  {id:'police', name:'경찰서', icon:'🚓', desc:'무기고가 아직 잠겨있을지도 모른다.'},
  {id:'rooftop', name:'옥상', icon:'🏙', desc:'도시 전체가 한눈에 보인다. 연기가 곳곳에서 피어오른다.'},
  {id:'basement', name:'지하실', icon:'🔦', desc:'손전등 없이는 한 걸음도 내딛기 힘들다.'},
];
const ITEMS = {
  bandage: {name:'붕대', desc:'체력을 소량 회복한다.', type:'heal', hp:15},
  medkit: {name:'치료약', desc:'체력을 크게 회복하고 감염을 줄인다.', type:'heal', hp:35, infect:-10},
  can: {name:'통조림', desc:'배고픔을 채운다.', type:'food', hunger:30},
  water: {name:'생수', desc:'배고픔과 피로를 조금 회복한다.', type:'food', hunger:15, fatigue:-10},
  battery: {name:'배터리', desc:'탐험 성공률을 잠시 높여준다.', type:'buff', explore:3},
  firebomb: {name:'화염병', desc:'전투 중 사용시 큰 피해를 준다.', type:'combat', dmg:25},
  key: {name:'열쇠', desc:'특정 구역의 잠긴 문을 연다.', type:'key'},
  mapPiece: {name:'지도 조각', desc:'희귀 이벤트 확률을 높여준다.', type:'buff', rareEvent:true},
  antidote: {name:'감염 해독제', desc:'감염 수치를 크게 낮춘다.', type:'heal', infect:-30},
};
const QUESTS = [
  {id:'q1', name:'통조림 3개 모으기', check:s=>(s.itemCount('can')>=3), reward:{gold:30,xp:20}},
  {id:'q2', name:'병원 지역 2회 탐험하기', check:s=>(s.regionVisits.hospital||0)>=2, reward:{gold:20,xp:25}},
  {id:'q3', name:'좀비 5마리 처치하기', check:s=>s.kills>=5, reward:{gold:40,xp:30}},
  {id:'q4', name:'친구 추가하기', check:s=>s.friendsAdded>=1, reward:{gold:15,xp:10}},
  {id:'q5', name:'오늘의 생존 미션 (탐험 3회)', check:s=>s.exploreCount>=3, reward:{gold:25,xp:15}},
];
const ACHIEVEMENTS = [
  {id:'a1', name:'첫 생존', check:s=>s.exploreCount>=1},
  {id:'a2', name:'첫 패배', check:s=>s.defeats>=1},
  {id:'a3', name:'첫 희귀 직업 획득', check:s=>s.jobRarity!=='common'},
  {id:'a4', name:'첫 전설 무기 획득', check:s=>s.weaponRarity==='legend'},
  {id:'a5', name:'연속 출석 3일', check:s=>s.loginStreak>=3},
  {id:'a6', name:'친구 3명 만들기', check:s=>s.friendsAdded>=3},
];

// ---------------- DATA API (실서비스에서는 fetch('/api/...')로 교체) ----------------
const DataAPI = {
  async saveGame(nick, state){
    try{ await window.storage.set('save:'+nick, JSON.stringify(state), false); return true; }
    catch(e){ console.error('save failed', e); return false; }
  },
  async loadGame(nick){
    try{ const r = await window.storage.get('save:'+nick, false); return r ? JSON.parse(r.value) : null; }
    catch(e){ return null; }
  },
  async updateRanking(entry){
    try{ await window.storage.set('rank:'+entry.nick, JSON.stringify(entry), true); return true; }
    catch(e){ return false; }
  },
  async getRanking(){
    try{
      const list = await window.storage.list('rank:', true);
      if(!list || !list.keys) return [];
      const entries = [];
      for(const k of list.keys){
        try{ const r = await window.storage.get(k, true); if(r) entries.push(JSON.parse(r.value)); }catch(e){}
      }
      entries.sort((a,b)=>b.score-a.score);
      return entries;
    }catch(e){ return []; }
  },
  async sendFriendRequest(from, to){
    try{
      const key = 'friendreq:'+to;
      let list = [];
      try{ const r = await window.storage.get(key, true); list = r? JSON.parse(r.value):[]; }catch(e){}
      if(!list.includes(from)) list.push(from);
      await window.storage.set(key, JSON.stringify(list), true);
      return true;
    }catch(e){ return false; }
  },
  async getFriendRequests(nick){
    try{ const r = await window.storage.get('friendreq:'+nick, true); return r? JSON.parse(r.value):[]; }
    catch(e){ return []; }
  },
  async acceptFriend(nick, other){
    try{
      // add each other
      for(const [a,b] of [[nick,other],[other,nick]]){
        const key='friends:'+a;
        let list=[];
        try{ const r=await window.storage.get(key,true); list=r?JSON.parse(r.value):[]; }catch(e){}
        if(!list.includes(b)) list.push(b);
        await window.storage.set(key, JSON.stringify(list), true);
      }
      // remove request
      let reqs = await this.getFriendRequests(nick);
      reqs = reqs.filter(r=>r!==other);
      await window.storage.set('friendreq:'+nick, JSON.stringify(reqs), true);
      return true;
    }catch(e){ return false; }
  },
  async getFriends(nick){
    try{ const r = await window.storage.get('friends:'+nick, true); return r? JSON.parse(r.value):[]; }
    catch(e){ return []; }
  },
  async removeFriend(nick, other){
    try{
      for(const [a,b] of [[nick,other],[other,nick]]){
        const key='friends:'+a;
        let list=[]; try{ const r=await window.storage.get(key,true); list=r?JSON.parse(r.value):[]; }catch(e){}
        list = list.filter(x=>x!==b);
        await window.storage.set(key, JSON.stringify(list), true);
      }
      return true;
    }catch(e){ return false; }
  }
};

// ---------------- EXPLORE ----------------
const EVENT_TYPES = ['item','zombie','supply','trap','npc','rare','boss'];
function startExplore(regionId){
  const region = REGIONS.find(r=>r.id===regionId);
  S.exploreCount++;
  S.regionVisits[regionId] = (S.regionVisits[regionId]||0)+1;
  S.fatigue = clamp(S.fatigue+8,0,100);
  S.hunger = clamp(S.hunger-6,0,100);

  // weighted random event, with pity/보호 장치
  let weights = {item:28, zombie:26, supply:16, trap:12, npc:10, rare:6, boss: S.exploreCount<3?0:2};
  if(S.job && S.job.lootBonus) weights.supply += 8;
  if(S.job && S.job.explore) weights.item += S.job.explore;
  const total = Object.values(weights).reduce((a,b)=>a+b,0);
  let roll = Math.random()*total, chosen='item';
  for(const [k,v] of Object.entries(weights)){ if(roll<v){chosen=k; break;} roll-=v; }

  const eventFns = {
    item: eventItem, zombie: eventZombie, supply: eventSupply,
    trap: eventTrap, npc: eventNpc, rare: eventRare, boss: eventBoss
  };
  eventFns[chosen](region);
}

function grantItem(id, qty=1){
  S.inventory[id] = (S.inventory[id]||0)+qty;
}

function eventItem(region){
  const pool = ['bandage','can','water','battery','key'];
  const item = pool[Math.floor(Math.random()*pool.length)];
  grantItem(item,1);
  screen.innerHTML = narrate(region.name, `${region.desc}\n\n바닥에 떨어진 물건을 발견했다 — [${ITEMS[item].name}]을(를) 획득했다.`);
  setActions([{label:'계속 탐험', hint:'▶', cls:'primary', onClick:renderHub}]);
}

function eventSupply(region){
  const bonus = (S.job&&S.job.lootBonus)?S.job.lootBonus:0;
  const gold = Math.floor((10+Math.random()*20)*(1+bonus));
  S.gold += gold;
  const rareDrop = Math.random() < (0.15+bonus);
  if(rareDrop) grantItem('antidote',1);
  screen.innerHTML = narrate(region.name, `숨겨진 보급 상자를 발견했다. 골드 +${gold}를 획득했다.${rareDrop?'\n상자 안에는 [감염 해독제]도 들어있었다!':''}`);
  setActions([{label:'계속 탐험', hint:'▶', cls:'primary', onClick:renderHub}]);
}

function eventTrap(region){
  const dodge = Math.random() < (0.35 + (S.job&&S.job.explore?S.job.explore*0.03:0));
  if(dodge){
    screen.innerHTML = narrate(region.name, `바닥에 놓인 철사를 발견하고 아슬아슬하게 피했다. 함정을 무사히 통과했다.`);
  } else {
    const dmg = 6+Math.floor(Math.random()*8);
    S.hp = clamp(S.hp-dmg,0,S.hpMax);
    screen.innerHTML = narrate(region.name, `숨겨진 함정에 걸렸다! 체력 -${dmg}.`);
  }
  setActions([{label:'계속 탐험', hint:'▶', cls:'primary', onClick:renderHub}]);
}

function eventNpc(region){
  const friendly = Math.random()<0.6;
  if(friendly){
    grantItem('can',1);
    screen.innerHTML = narrate(region.name, `떨고 있는 생존자를 만났다. 그는 감사의 표시로 통조림을 건넸다.`);
  } else {
    const gold = Math.floor(5+Math.random()*15);
    S.gold = Math.max(0, S.gold-gold);
    screen.innerHTML = narrate(region.name, `낯선 생존자가 위협하며 골드 ${gold}를 빼앗아 갔다. 문을 열면 생존자가 아니라 위기가 기다릴 수도 있다.`);
  }
  setActions([{label:'계속 탐험', hint:'▶', cls:'primary', onClick:renderHub}]);
}

function eventRare(region){
  grantItem('mapPiece',1);
  const gold = 30+Math.floor(Math.random()*30);
  S.gold += gold;
  screen.innerHTML = narrate(region.name, `✨ 희귀 이벤트! 봉인된 창고를 발견했다. [지도 조각]과 골드 +${gold}를 획득했다.`);
  setActions([{label:'계속 탐험', hint:'▶', cls:'primary', onClick:renderHub}]);
}

function eventZombie(region){
  startBattle(region, false);
}
function eventBoss(region){
  startBattle(region, true);
}

// ---------------- BATTLE ----------------
function startBattle(region, isBoss){
  const zHp = isBoss ? 60+Math.floor(Math.random()*20) : 18+Math.floor(Math.random()*14);
  const zAtk = isBoss ? 10+Math.floor(Math.random()*6) : 4+Math.floor(Math.random()*5);
  currentBattle = {
    region, isBoss, zHp, zHpMax:zHp, zAtk,
    log: isBoss ? '거대한 형체가 어둠 속에서 모습을 드러낸다. 심상치 않은 좀비다.' : '어둠 속에서 좀비 하나가 천천히 고개를 든다.'
  };
  renderBattle();
}
function renderBattle(){
  const b = currentBattle;
  showNav(null); updateStatusbar();
  screen.innerHTML = `
    <div class="small-label">${b.isBoss?'⚠ 보스 전투':'전투'} · ${b.region.name}</div>
    <div class="card" style="border-color:${b.isBoss?'var(--gold)':'var(--blood)'};">
      <div class="row-between">
        <span>${b.isBoss?'👹 변이체':'🧟 좀비'}</span>
        <span class="pill">HP ${Math.max(0,b.zHp)}/${b.zHpMax}</span>
      </div>
      <div class="bartrack" style="margin-top:8px;"><div class="barfill fill-hp" style="width:${clamp(b.zHp/b.zHpMax*100,0,100)}%"></div></div>
    </div>
    ${narrate('전투 로그', b.log)}
  `;
  setActions([
    {label:'⚔ 공격', hint:'▶', cls:'primary', onClick:battleAttack},
    {label:'🛡 방어', hint:'▶', onClick:battleDefend},
    {label:'💊 아이템 사용', hint:'▶', onClick:battleItemMenu},
    {label:'🏃 도주', hint:'▶', onClick:battleFlee},
  ]);
}
function battleItemMenu(){
  const usable = Object.keys(S.inventory).filter(id=>S.inventory[id]>0 && (ITEMS[id].type==='heal'||ITEMS[id].type==='combat'));
  if(!usable.length){ toast('사용할 아이템이 없습니다.'); return; }
  const b = currentBattle;
  screen.innerHTML = `<div class="small-label">전투 중 아이템 사용</div>` + narrate('상황', b.log);
  setActions(usable.map(id=>({
    label:`${ITEMS[id].name} (${S.inventory[id]})`, hint:'사용', onClick:()=>useItemInBattle(id)
  })).concat([{label:'취소', hint:'뒤로', onClick:renderBattle}]));
}
function useItemInBattle(id){
  const item = ITEMS[id];
  S.inventory[id]--;
  let text='';
  if(item.type==='heal'){
    if(item.hp){ const bonus = S.job&&S.job.healBonus?S.job.healBonus:0; const heal=Math.floor(item.hp*(1+bonus)); S.hp=clamp(S.hp+heal,0,S.hpMax); text+=`체력 +${heal}. `; }
    if(item.infect){ S.infect=clamp(S.infect+item.infect,0,100); text+=`감염 ${item.infect}. `; }
  } else if(item.type==='combat'){
    currentBattle.zHp -= item.dmg;
    text += `${item.name} 사용! 좀비에게 ${item.dmg} 피해. `;
  }
  currentBattle.log = `[${item.name}] ${text}`;
  if(currentBattle.zHp<=0){ battleWin(); return; }
  zombieTurn();
}
function battleAttack(){
  const b = currentBattle;
  let dmg = S.atk + Math.floor(Math.random()*4)-1;
  let hitBonus = S.job&&S.job.hitBonus?S.job.hitBonus:0;
  const miss = Math.random() < clamp(0.08-hitBonus,0,0.3);
  if(miss){
    b.log = '공격이 빗나갔다!';
  } else {
    if(S.weapon && S.weapon.mobBonus && !b.isBoss) dmg = Math.floor(dmg*1.2);
    if(S.weapon && S.weapon.bossBonus && b.isBoss) dmg = Math.floor(dmg*(1+S.weapon.bossBonus));
    if(S.weapon && S.weapon.bleed) dmg += 2;
    b.zHp -= dmg;
    b.log = `${S.weapon?S.weapon.name:'맨손'}(으)로 공격! ${dmg}의 피해를 입혔다.`;
    if(S.weaponDurability>0) S.weaponDurability--;
  }
  if(b.zHp<=0){ battleWin(); return; }
  zombieTurn();
}
function battleDefend(){
  currentBattle.defending = true;
  currentBattle.log = '방어 태세를 취했다. 다음 피해가 줄어든다.';
  zombieTurn();
}
function battleFlee(){
  const base = 0.4 + (S.job&&S.job.flee?S.job.flee*0.02:0) + (S.weapon&&S.weapon.fleeBonus?S.weapon.fleeBonus:0);
  const success = Math.random() < base;
  if(success){
    toast('도주에 성공했다.');
    renderHub();
  } else {
    currentBattle.log = '도주에 실패했다! 좀비가 반격한다.';
    zombieTurn(true);
  }
}
function zombieTurn(isCounter){
  const b = currentBattle;
  let dmg = b.zAtk + Math.floor(Math.random()*4)-1;
  if(b.defending){ dmg = Math.floor(dmg*0.4); b.defending=false; }
  dmg = Math.max(1, dmg - Math.floor(S.def*0.5));
  S.hp = clamp(S.hp-dmg,0,S.hpMax);
  const infectGain = b.isBoss ? Math.floor(Math.random()*4) : Math.floor(Math.random()*2);
  S.infect = clamp(S.infect+infectGain,0,100);
  b.log = (isCounter?'좀비의 반격! ':'좀비의 공격! ') + `체력 -${dmg}${infectGain?`, 감염 +${infectGain}`:''}`;
  if(S.hp<=0){ battleLose(); return; }
  renderBattle();
}
function battleWin(){
  const b = currentBattle;
  S.kills++;
  const xp = b.isBoss ? 40 : 12+Math.floor(Math.random()*8);
  const gold = b.isBoss ? 50+Math.floor(Math.random()*30) : 8+Math.floor(Math.random()*10);
  S.xp += xp; S.gold += gold; S.score += b.isBoss?50:10;
  const lootRoll = Math.random() < (0.4 + (S.job&&S.job.lootBonus?S.job.lootBonus:0));
  let lootText='';
  if(lootRoll){ const pool=['bandage','can','water']; const it=pool[Math.floor(Math.random()*pool.length)]; grantItem(it,1); lootText=`\n전리품: [${ITEMS[it].name}] 획득.`; }
  checkLevelUp();
  screen.innerHTML = narrate('승리', `${b.isBoss?'변이체':'좀비'}를 쓰러뜨렸다! 경험치 +${xp}, 골드 +${gold}.${lootText}`);
  setActions([{label:'계속 진행', hint:'▶', cls:'primary', onClick:renderHub}]);
  currentBattle = null;
  checkQuests();
}
function battleLose(){
  S.defeats++;
  S.hp = Math.floor(S.hpMax*0.3);
  S.infect = clamp(S.infect+10,0,100);
  S.score = Math.max(0, S.score-5);
  screen.innerHTML = narrate('위기 탈출', `쓰러지기 직전, 가까스로 몸을 빼내 도망쳤다. 체력이 크게 줄고 감염 수치가 상승했다.`);
  setActions([{label:'상처 추스르기', hint:'▶', cls:'primary', onClick:renderHub}]);
  currentBattle = null;
}
function checkLevelUp(){
  while(S.xp >= S.xpNeed){
    S.xp -= S.xpNeed;
    S.level++;
    S.xpNeed = Math.floor(S.xpNeed*1.25);
    S.hpMax += 8; S.hp = S.hpMax; S.atk += 2; S.def += 1;
    toast(`레벨 업! Lv.${S.level}`);
  }
}

// ---------------- INVENTORY ----------------
function renderInventory(){
  showNav('inventory'); updateStatusbar();
  const ids = Object.keys(S.inventory).filter(id=>S.inventory[id]>0);
  let body = `<div class="small-label">인벤토리</div>`;
  if(!ids.length){ body += narrate('안내','가진 아이템이 없다.'); }
  else{
    body += `<div class="inv-grid">`;
    ids.forEach(id=>{
      const it = ITEMS[id];
      body += `<div class="inv-item">
        <div class="iname">${it.name}</div>
        <div style="color:var(--text-dim); font-size:11px;">${it.desc}</div>
        <div class="qty">보유 ${S.inventory[id]}개</div>
        ${it.type!=='key'?`<button class="usebtn" data-use="${id}">사용</button>`:''}
      </div>`;
    });
    body += `</div>`;
  }
  body += `<div class="small-label" style="margin-top:18px;">장비</div>
    <div class="card">
      <div style="font-size:12px; color:var(--text-dim);">직업</div>
      <div style="margin-bottom:8px;">${S.job?S.job.name:'-'}</div>
      <div style="font-size:12px; color:var(--text-dim);">무기</div>
      <div>${S.weapon?S.weapon.name+' (내구도 '+S.weaponDurability+')':'-'}</div>
    </div>`;
  screen.innerHTML = body;
  [...screen.querySelectorAll('[data-use]')].forEach(el=>{
    el.onclick = ()=> useItemOutside(el.dataset.use);
  });
  setActions([]);
}
function useItemOutside(id){
  const item = ITEMS[id];
  if(!S.inventory[id]) return;
  S.inventory[id]--;
  let text=`[${item.name}] 사용.`;
  if(item.hp){ const bonus=S.job&&S.job.healBonus?S.job.healBonus:0; const heal=Math.floor(item.hp*(1+bonus)); S.hp=clamp(S.hp+heal,0,S.hpMax); text+=` 체력 +${heal}.`; }
  if(item.hunger){ S.hunger=clamp(S.hunger+item.hunger,0,100); text+=` 배고픔 +${item.hunger}.`; }
  if(item.fatigue){ S.fatigue=clamp(S.fatigue+item.fatigue,0,100); text+=` 피로 ${item.fatigue}.`; }
  if(item.infect){ S.infect=clamp(S.infect+item.infect,0,100); text+=` 감염 ${item.infect}.`; }
  toast(text);
  renderInventory();
}

// ---------------- QUESTS ----------------
function checkQuests(){
  QUESTS.forEach(q=>{
    if(S.questProgress[q.id]) return;
    if(q.check(S)){
      S.questProgress[q.id] = true;
      S.gold += q.reward.gold; S.xp += q.reward.xp;
      checkLevelUp();
      toast(`퀘스트 완료: ${q.name} (골드+${q.reward.gold}, XP+${q.reward.xp})`);
    }
  });
  ACHIEVEMENTS.forEach(a=>{
    if(S.achieved[a.id]) return;
    if(a.check(S)){ S.achieved[a.id]=true; toast(`🏅 업적 달성: ${a.name}`); }
  });
}
function renderQuests(){
  showNav('quest'); updateStatusbar();
  checkQuests();
  let body = `<div class="small-label">퀘스트</div>`;
  QUESTS.forEach(q=>{
    const done = !!S.questProgress[q.id];
    body += `<div class="card" style="${done?'opacity:0.55;':''}">
      <div class="row-between"><span>${done?'✅':'🔲'} ${q.name}</span><span class="pill">골드+${q.reward.gold} · XP+${q.reward.xp}</span></div>
    </div>`;
  });
  body += `<div class="small-label" style="margin-top:18px;">업적</div>`;
  ACHIEVEMENTS.forEach(a=>{
    const done = !!S.achieved[a.id];
    body += `<div class="card" style="${done?'opacity:0.55;':''}">
      <div class="row-between"><span>${done?'🏅':'⬜'} ${a.name}</span></div>
    </div>`;
  });
  screen.innerHTML = body;
  setActions([]);
}

// ---------------- RANKING ----------------
async function renderRanking(){
  showNav('ranking'); updateStatusbar();
  screen.innerHTML = `<div class="small-label">🏆 전체 랭킹</div><div class="card" style="text-align:center; color:var(--text-dim);">불러오는 중...</div>`;
  await DataAPI.updateRanking({
    nick:S.nick, job: S.job?S.job.name:'-', level:S.level, score:S.score,
    friends:(await DataAPI.getFriends(S.nick)).length, lastActive: Date.now()
  });
  const list = await DataAPI.getRanking();
  const top = list.slice(0,10);
  const myRank = list.findIndex(e=>e.nick===S.nick)+1;
  let body = `<div class="small-label row-between">🏆 전체 랭킹 <span id="refresh-rank" style="color:var(--toxic); cursor:pointer;">↻ 새로고침</span></div>`;
  if(!top.length){ body += narrate('안내','아직 랭킹 데이터가 없습니다.'); }
  top.forEach((e,i)=>{
    const isMe = e.nick===S.nick;
    body += `<div class="rank-row ${isMe?'me':''}">
      <div class="rank-num">${i+1}</div>
      <div class="rank-info"><div class="nick">${e.nick}${isMe?' (나)':''}</div><div class="meta">${e.job} · Lv.${e.level} · 친구 ${e.friends}</div></div>
      <div class="rank-score">⭐${e.score}</div>
    </div>`;
  });
  if(myRank>10){
    body += `<hr class="divider">` + `<div class="rank-row me"><div class="rank-num">${myRank}</div><div class="rank-info"><div class="nick">${S.nick} (나)</div></div><div class="rank-score">⭐${S.score}</div></div>`;
  }
  screen.innerHTML = body;
  $('#refresh-rank').onclick = renderRanking;
  setActions([]);
}

// ---------------- FRIENDS ----------------
async function renderFriends(){
  showNav('friends'); updateStatusbar();
  screen.innerHTML = `<div class="card" style="text-align:center; color:var(--text-dim);">불러오는 중...</div>`;
  const friends = await DataAPI.getFriends(S.nick);
  const requests = await DataAPI.getFriendRequests(S.nick);
  let body = `<div class="small-label">👥 친구 추가</div>
    <input type="text" id="friend-search" placeholder="닉네임으로 검색">`;
  body += `<div id="friend-search-result"></div>`;

  if(requests.length){
    body += `<div class="small-label" style="margin-top:18px;">받은 친구 요청</div>`;
    requests.forEach(r=>{
      body += `<div class="friend-row">
        <div class="friend-avatar">👤</div>
        <div style="flex:1;">${r}</div>
        <button class="usebtn" style="width:auto; padding:6px 10px;" data-accept="${r}">수락</button>
      </div>`;
    });
  }

  body += `<div class="small-label" style="margin-top:18px;">친구 목록 (${friends.length})</div>`;
  if(!friends.length){ body += narrate('안내','아직 친구가 없습니다. 닉네임으로 검색해 추가해보세요.'); }
  else{
    const rankList = await DataAPI.getRanking();
    friends.forEach(f=>{
      const info = rankList.find(e=>e.nick===f);
      body += `<div class="friend-row">
        <div class="friend-avatar">🧑</div>
        <div style="flex:1;">
          <div>${f}</div>
          <div style="font-size:10px; color:var(--text-dim);">${info?`${info.job} · Lv.${info.level} · ⭐${info.score}`:'정보 없음'}</div>
        </div>
        <button class="usebtn" style="width:auto; padding:6px 10px; color:var(--blood-bright);" data-remove="${f}">삭제</button>
      </div>`;
    });
  }
  screen.innerHTML = body;

  $('#friend-search').addEventListener('input', debounce(async (e)=>{
    const q = e.target.value.trim();
    const box = $('#friend-search-result');
    if(!q){ box.innerHTML=''; return; }
    const rankList = await DataAPI.getRanking();
    const matches = rankList.filter(x=>x.nick.includes(q) && x.nick!==S.nick).slice(0,5);
    box.innerHTML = matches.length ? matches.map(m=>`
      <div class="friend-row">
        <div class="friend-avatar">👤</div>
        <div style="flex:1;">${m.nick}<div style="font-size:10px; color:var(--text-dim);">${m.job} · Lv.${m.level}</div></div>
        <button class="usebtn" style="width:auto; padding:6px 10px;" data-request="${m.nick}">요청</button>
      </div>`).join('') : `<div style="font-size:12px; color:var(--text-dim); padding:8px 2px;">검색 결과가 없습니다.</div>`;
    [...box.querySelectorAll('[data-request]')].forEach(el=>{
      el.onclick = async ()=>{ await DataAPI.sendFriendRequest(S.nick, el.dataset.request); toast('친구 요청을 보냈습니다.'); };
    });
  }, 350));

  [...screen.querySelectorAll('[data-accept]')].forEach(el=>{
    el.onclick = async ()=>{
      await DataAPI.acceptFriend(S.nick, el.dataset.accept);
      S.friendsAdded++;
      toast(`${el.dataset.accept}님과 친구가 되었습니다.`);
      checkQuests();
      renderFriends();
    };
  });
  [...screen.querySelectorAll('[data-remove]')].forEach(el=>{
    el.onclick = async ()=>{ await DataAPI.removeFriend(S.nick, el.dataset.remove); renderFriends(); };
  });
  setActions([]);
}
function debounce(fn, ms){ let t; return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args), ms); }; }

// ---------------- AUTOSAVE ----------------
let saveTimer=null;
function autoSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    if(!S.nick) return;
    const snapshot = Object.assign({}, S);
    delete snapshot.itemCount;
    DataAPI.saveGame(S.nick, snapshot);
  }, 400);
}

// ---------------- INIT ----------------
renderTitle();
</script>
</body>
</html>
